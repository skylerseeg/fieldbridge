name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

# Cancel superseded runs on the same ref to keep CI minutes lean.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # Every job below runs from `fieldbridge/`. The repo's tree puts all
    # app code there, so this saves a `cd fieldbridge` in every step.
    working-directory: fieldbridge

jobs:
  # --------------------------------------------------------------------- #
  # Backend                                                               #
  # --------------------------------------------------------------------- #
  backend-lint:
    name: backend / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fieldbridge/backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.15.12

      - name: ruff check
        working-directory: fieldbridge/backend
        run: ruff check app tests

      # `ruff format --check` is hard-enforced only on the harness
      # files the Tests/CI Worker owns. App-source + module-owned test
      # format debt is advisory-only until each module worker opts in.
      - name: ruff format --check (Tests/CI-owned harness)
        working-directory: fieldbridge/backend
        run: |
          ruff format --check \
            tests/integration/__init__.py \
            tests/integration/conftest.py \
            tests/integration/harness.py \
            tests/integration/test_harness_smoke.py \
            tests/llm \
            tests/safety

      - name: ruff format --check (app + module tests, advisory)
        working-directory: fieldbridge/backend
        continue-on-error: true
        run: ruff format --check app tests

  backend-test:
    name: backend / pytest + coverage
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fieldbridge/backend/requirements.txt

      - name: Install backend deps
        working-directory: fieldbridge/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      # The pyproject.toml sets pythonpath="." so pytest can import `app`
      # without an explicit PYTHONPATH env var. Coverage gate ramps via
      # COV_FAIL_UNDER so we can raise it quarterly without touching
      # the workflow body. Ratchet schedule (see agent_board.md):
      #   2026-Q2 (now)  ->  65%   (current measured: 68.6%)
      #   2026-Q3        ->  70%
      #   2026-Q4        ->  75%
      #   2027-Q1        ->  80%
      - name: pytest with coverage
        working-directory: fieldbridge/backend
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          COV_FAIL_UNDER: "65"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under="${COV_FAIL_UNDER}" \
            --junitxml=pytest-junit.xml

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: fieldbridge/backend/htmlcov

      - name: Upload pytest junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-junit
          path: fieldbridge/backend/pytest-junit.xml

  # --------------------------------------------------------------------- #
  # Frontend                                                              #
  # --------------------------------------------------------------------- #
  frontend-lint:
    name: frontend / eslint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fieldbridge/frontend/package-lock.json

      - name: Install
        working-directory: fieldbridge/frontend
        run: npm ci

      - name: eslint
        working-directory: fieldbridge/frontend
        run: npm run lint

      - name: tsc --noEmit
        working-directory: fieldbridge/frontend
        run: npm run typecheck

  frontend-test:
    name: frontend / vitest
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: fieldbridge/frontend/package-lock.json

      - name: Install
        working-directory: fieldbridge/frontend
        run: npm ci

      # `test` is opt-in: until vitest is wired up in package.json, the
      # job exits 0 with a clear log line so module workers aren't
      # blocked. Once `npm run test` exists, the job runs it as a hard
      # gate.
      - name: Run vitest if configured
        working-directory: fieldbridge/frontend
        run: |
          if node -e "process.exit(require('./package.json').scripts.test ? 0 : 1)"; then
            npm test -- --run --reporter=default
          else
            echo "::warning::frontend has no `npm run test` script yet — skipping vitest job. Tests/CI Worker tracks this in agent_board.md."
          fi
